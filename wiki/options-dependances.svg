<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="system-ui, 'Segoe UI', sans-serif">
  <style>
    .bg { fill: #FBFBF9; }
    .title { fill: #23262A; font-size: 17px; font-weight: 600; }
    .root { fill: #2F3B4C; }
    .roottxt { fill: #FFFFFF; font-size: 13.5px; font-weight: 600; }
    .box { fill: #E8EDF4; stroke: #9FB2C8; }
    .boxtxt { fill: #23262A; font-size: 12.5px; font-weight: 600; }
    .sub { fill: #F6EFE2; stroke: #C9A96A; }
    .subtxt { fill: #5C4718; font-size: 12px; font-weight: 600; }
    .desc { fill: #6B6E74; font-size: 11.5px; }
    .line { stroke: #A9AFB8; stroke-width: 1.2; fill: none; }
    .rule { fill: #23262A; font-size: 12.5px; font-weight: 600; }
  </style>

  <rect class="bg" width="880" height="560"/>
  <text class="title" x="28" y="34">Options APIExpose — qui dépend de qui</text>

  <rect class="root" x="28" y="52" width="220" height="34" rx="6"/>
  <text class="roottxt" x="44" y="74">ENABLE API EXPOSE</text>
  <text class="desc" x="262" y="74">OFF ici = tout APIExpose est coupé</text>

  <path class="line" d="M 52 86 L 52 480"/>

  <path class="line" d="M 52 122 L 76 122"/>
  <rect class="box" x="76" y="106" width="210" height="30" rx="5"/>
  <text class="boxtxt" x="90" y="126">LOCAL MEDIA MANAGER</text>
  <text class="desc" x="300" y="126">médias et gamelists locales</text>

  <path class="line" d="M 120 136 L 120 168 L 140 168"/>
  <rect class="sub" x="140" y="152" width="220" height="30" rx="5"/>
  <text class="subtxt" x="154" y="172">AUTO SCRAPING MANAGER</text>
  <text class="desc" x="374" y="172">et tous ses interrupteurs par média — sans le</text>
  <text class="desc" x="374" y="186">Local Media Manager, aucun scraping ne tourne</text>

  <path class="line" d="M 52 222 L 76 222"/>
  <rect class="box" x="76" y="206" width="210" height="30" rx="5"/>
  <text class="boxtxt" x="90" y="226">ROMS MANAGER</text>
  <text class="desc" x="300" y="226">filtres du romset, installeurs de packs ROMs</text>

  <path class="line" d="M 52 272 L 76 272"/>
  <rect class="box" x="76" y="256" width="210" height="30" rx="5"/>
  <text class="boxtxt" x="90" y="276">MARQUEE MANAGER</text>
  <text class="desc" x="300" y="276">données marquee/DMD, autogen, push WebSocket</text>

  <path class="line" d="M 52 322 L 76 322"/>
  <rect class="box" x="76" y="306" width="210" height="30" rx="5"/>
  <text class="boxtxt" x="90" y="326">GAME EVENTS MANAGER</text>
  <text class="desc" x="300" y="326">événements ingame, high scores, sorties MAME</text>

  <path class="line" d="M 52 372 L 76 372"/>
  <rect class="box" x="76" y="356" width="210" height="30" rx="5"/>
  <text class="boxtxt" x="90" y="376">THEMES MANAGER</text>
  <text class="desc" x="300" y="376">exports thèmes, high score expose, panels CPO</text>

  <path class="line" d="M 52 422 L 76 422"/>
  <rect class="box" x="76" y="406" width="210" height="30" rx="5"/>
  <text class="boxtxt" x="90" y="426">COLLECTIONS PACK MANAGER</text>
  <text class="desc" x="300" y="426">packs et collections dynamiques</text>

  <path class="line" d="M 52 472 L 76 472"/>
  <rect class="box" x="76" y="456" width="210" height="30" rx="5"/>
  <text class="boxtxt" x="90" y="476">RÉGLAGES TRANSVERSES</text>
  <text class="desc" x="300" y="476">notifications, Swagger, splashscreen</text>

  <path class="line" d="M 28 508 L 852 508" stroke-dasharray="3 3"/>
  <text class="rule" x="28" y="532">Un interrupteur n'agit que si toute sa branche est ON.</text>
  <text class="desc" x="28" y="549">Exemple : SCRAPE VIDEOS sur ON ne fait rien si l'Auto Scraping Manager ou le Local Media Manager est OFF.</text>
</svg>
