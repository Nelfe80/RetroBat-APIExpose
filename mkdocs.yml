site_name: RetroBat APIExpose
site_description: Médias, gamelists, packs de ROMs, scraping, collections et API locale pour RetroBat.
site_url: https://nelfe80.github.io/RetroBat-APIExpose/
repo_url: https://github.com/Nelfe80/RetroBat-APIExpose
repo_name: Nelfe80/RetroBat-APIExpose
docs_dir: wiki
edit_uri: ""

theme:
  name: material
  language: fr
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Mode clair
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: fr
          default: true
          name: Français
          build: true
        - locale: en
          name: English
          build: true
          site_name: RetroBat APIExpose
          nav_translations:
            Accueil: Home
            Premiers pas: Getting started
            Menus et options: Menus and options
            Médias et scraping: Media and scraping
            ROMs et collections: ROMs and collections
            Arcade et panels: Arcade and panels
            Créer ses fichiers .MEM: Creating .MEM files
            API locale: Local API
            Dépannage: Troubleshooting
            Licences: Licensing

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Accueil: index.md
  - Premiers pas: premiers-pas.md
  - Menus et options: menus.md
  - Médias et scraping: medias.md
  - ROMs et collections: roms.md
  - Arcade et panels: arcade.md
  - Créer ses fichiers .MEM: mem.md
  - API locale: api.md
  - Dépannage: depannage.md
  - Licences: licences.md
