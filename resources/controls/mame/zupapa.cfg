<?xml version='1.0' encoding='utf-8'?>
<mameconfig version="10">
    <system name="zupapa">
        <image_directories>
            <device instance="memcard" directory="" />
            <device instance="cartridge" directory="" />
        </image_directories>
        <mixer>
            <audio_effects tag=":speaker">
                <effect step="1" type="Filters" />
                <effect step="2" type="Compressor" />
                <effect step="3" type="Reverb" />
                <effect step="4" type="Equalizer" />
            </audio_effects>
            <sound_map tag=":speaker">
                <node_mapping node="" db="0.000000" />
            </sound_map>
        </mixer>
        <input>
            <port tag=":AUDIO_COIN" type="COIN1" mask="1" defvalue="1">
                <newseq type="standard">KEYCODE_5 OR JOYCODE_1_BUTTON10</newseq>
            </port>
            <port tag=":AUDIO_COIN" type="COIN2" mask="2" defvalue="2">
                <newseq type="standard">KEYCODE_5 OR JOYCODE_3_BUTTON10</newseq>
            </port>
            <port tag=":edge:joy:JOY1" type="P1_A" mask="16" defvalue="16">
                <newseq type="standard">JOYCODE_1_BUTTON1</newseq>
            </port>
            <port tag=":edge:joy:JOY1" type="P1_B" mask="32" defvalue="32">
                <newseq type="standard">JOYCODE_1_BUTTON2</newseq>
            </port>
            <port tag=":edge:joy:JOY2" type="P2_A" mask="16" defvalue="16">
                <newseq type="standard">JOYCODE_3_BUTTON1</newseq>
            </port>
            <port tag=":edge:joy:JOY2" type="P2_B" mask="32" defvalue="32">
                <newseq type="standard">JOYCODE_3_BUTTON2</newseq>
            </port>
            <port tag=":edge:joy:START" type="1_PLAYER_START" mask="1" defvalue="1">
                <newseq type="standard">KEYCODE_1 OR JOYCODE_1_BUTTON9</newseq>
            </port>
            <port tag=":edge:joy:START" type="2_PLAYERS_START" mask="4" defvalue="4">
                <newseq type="standard">KEYCODE_1 OR JOYCODE_3_BUTTON9</newseq>
            </port>
        </input>
    </system>
</mameconfig>